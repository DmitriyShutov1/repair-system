server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:

      routes:

        - id: auth
          uri: http://users-service:8081
          predicates:
            - Path=/api/auth/**

        - id: admin-users
          uri: http://users-service:8081
          predicates:
            - Path=/api/crud/users/**

        - id: admin-branches
          uri: http://users-service:8081
          predicates:
            - Path=/api/crud/branches/**

        - id: orders
          uri: http://orders-service:8083
          predicates:
            - Path=/api/orders/**

        - id: warehouse-parts
          uri: http://warehouse-service:8082
          predicates:
            - Path=/api/parts/**

        - id: warehouse-pricing
          uri: http://warehouse-service:8082
          predicates:
            - Path=/api/pricing-policies/**

        - id: warehouse-services
          uri: http://warehouse-service:8082
          predicates:
            - Path=/api/services/**

        - id: warehouse-stock
          uri: http://warehouse-service:8082
          predicates:
            - Path=/api/stock/**

        - id: support-requests
          uri: http://support-service:8084
          predicates:
            - Path=/api/support-requests/**

        - id: stats
          uri: http://stats-service:8085
          predicates:
            - Path=/api/stats/**

      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

