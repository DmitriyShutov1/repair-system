server:
  port: 8084
  address: 0.0.0.0 

spring:
  datasource:
    url: jdbc:postgresql://support-postgres:5432/support_db
    username: support_user
    password: 123456
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

