server:
  port: 8082
  address: 0.0.0.0 

spring:
  datasource:
    url: jdbc:postgresql://warehouse-postgres:5432/warehouse_db
    username: warehouse_user
    password: 123456
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

